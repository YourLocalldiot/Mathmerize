<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/Mathmerize%20logo_Favicon_Purple_White.png" type="image/png">
    <title>Mathmerize - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="min-h-screen flex text-slate-800">

    <!-- Sidebar -->
    <aside id="main-sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col h-screen sticky top-0 flex-shrink-0 overflow-hidden" style="transition: width 0.25s cubic-bezier(.4,0,.2,1);">
        <!-- Header: logo left, toggle right -->
        <div class="flex items-center justify-between gap-2 px-4 py-4 min-h-[64px]">
            <div class="flex items-center gap-2 overflow-hidden whitespace-nowrap">
                <div class="sidebar-logo-image mask-logo" title="Mathmerize"></div>
            </div>
            <button id="sidebar-toggle" title="Toggle sidebar" class="flex-shrink-0 flex items-center justify-center w-7 h-7 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 hover:border-indigo-200 transition-all">
                <svg id="sidebar-toggle-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transition:transform 0.25s;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-medium transition-colors overflow-hidden whitespace-nowrap">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="sidebar-link-text" style="transition:opacity 0.2s;">Home</span>
            </a>
            <a href="pages/library.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors overflow-hidden whitespace-nowrap">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v-4a4 4 0 018 0v4M5 20h14a2 2 0 002-2v-1a2 2 0 00-2-2H5a2 2 0 00-2 2v1a2 2 0 002 2z"></path></svg>
                <span class="sidebar-link-text" style="transition:opacity 0.2s;">Library</span>
            </a>
        </nav>

        <!-- Authentication -->
        <div class="p-4 border-t border-slate-200" id="auth-container">
            <!-- Dynamically populated by index-auth.js -->
            <div class="animate-pulse flex space-x-4">
                <div class="rounded-full bg-slate-200 h-10 w-10"></div>
                <div class="flex-1 space-y-2 py-1">
                    <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                    <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 mesh-bg flex flex-col relative overflow-hidden">
        
        <!-- Center Cards Area -->
        <div class="flex-1 flex flex-col items-center justify-center p-8">
            <div class="w-full max-w-3xl">
                
                <!-- Logo -->
                <div class="flex justify-center mb-16">
                    <div class="mask-logo" style="width: 380px; height: 80px;" title="Mathmerize"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-2xl mx-auto">
                    
                    <!-- Create Card -->
                    <a href="pages/create-quiz.html" class="action-card group relative bg-white/80 backdrop-blur-xl border border-white p-10 rounded-[2rem] shadow-xl flex flex-col items-center text-center overflow-hidden h-[260px] justify-center">
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-50/50 to-purple-50/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="relative z-10 flex flex-col items-center justify-center h-full">
                            <div class="icon-wrapper w-[72px] h-[72px] bg-indigo-100/80 text-indigo-600 rounded-2xl flex items-center justify-center mb-5 shadow-sm">
                                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                            <h2 class="text-[1.35rem] font-bold text-slate-800 mb-2">Create</h2>
                            <p class="text-[0.85rem] text-slate-500 font-medium">Build a new math resource or quiz</p>
                        </div>
                    </a>

                    <!-- Join Quiz Card -->
                    <a href="pages/join.html" class="action-card group relative bg-white/80 backdrop-blur-xl border border-white p-10 rounded-[2rem] shadow-xl flex flex-col items-center text-center overflow-hidden h-[260px] justify-center">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-50/50 to-cyan-50/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="relative z-10 flex flex-col items-center justify-center h-full">
                            <div class="icon-wrapper w-[72px] h-[72px] bg-indigo-100/80 text-indigo-600 rounded-2xl flex items-center justify-center mb-5 shadow-sm">
                                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            </div>
                            <h2 class="text-[1.35rem] font-bold text-slate-800 mb-2">Join Quiz</h2>
                            <p class="text-[0.85rem] text-slate-500 font-medium">Enter a code to join an existing quiz</p>
                        </div>
                    </a>

                </div>
            </div>
        </div>

    </main>

    <script type="module" src="js/index-auth.js"></script>
    <script>
        const sidebar = document.getElementById('main-sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const COLLAPSED_KEY = 'sidebar-collapsed';

        // Apply initial state
        if (localStorage.getItem(COLLAPSED_KEY) === 'true') {
            sidebar.classList.add('collapsed');
        }

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem(COLLAPSED_KEY, sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
