<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/Mathmerize%20logo_Favicon_Purple_White.png" type="image/png">
    <title>Mathmerize - Login or Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="min-h-screen mesh-bg flex items-center justify-center p-4">

    <!-- Go Back Link -->
    <a href="../index.html" class="absolute top-6 left-6 flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Home
    </a>

    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white rounded-3xl shadow-2xl overflow-hidden p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-600 tracking-tight flex items-center justify-center gap-2 mb-2">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                Mathmerize
            </h1>
            <p class="text-slate-500">Master math concepts with style</p>
        </div>

        <!-- Toggle Switch -->
        <div class="flex p-1 bg-slate-100 rounded-xl mb-8">
            <button id="show-login" class="flex-1 py-2 text-sm font-semibold rounded-lg toggle-btn active transition-all">Login</button>
            <button id="show-signup" class="flex-1 py-2 text-sm font-semibold text-slate-500 rounded-lg toggle-btn transition-all">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="block space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" placeholder="you@example.com" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <a href="#" class="text-xs text-indigo-600 hover:text-indigo-700 font-medium">Forgot password?</a>
                </div>
                <input type="password" placeholder="••••••••" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all shadow-md active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="hidden space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                <input type="text" placeholder="John Doe" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" placeholder="you@example.com" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" placeholder="Create a password" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white rounded-xl font-bold transition-all shadow-md active:scale-[0.98]">
                Create Account
            </button>
        </form>

    </div>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
