<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/Mathmerize%20logo_Favicon_Purple_White.png" type="image/png">
    <title>My Library — Mathmerize</title>
    <meta name="description" content="Browse and manage your Mathmerize quiz library.">
    <link rel="stylesheet" href="../css/library.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="main-sidebar">
        <!-- Header: logo left, toggle right -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-image mask-logo" title="Mathmerize"></div>
            </div>
            <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="library.html" class="nav-link active">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 14v-4a4 4 0 018 0v4M5 20h14a2 2 0 002-2v-1a2 2 0 00-2-2H5a2 2 0 00-2 2v1a2 2 0 002 2z"/>
                </svg>
                <span>Library</span>
            </a>
        </nav>

        <!-- Auth Section -->
        <div class="auth-section" id="auth-container">
            <!-- Skeleton while loading -->
            <div class="skeleton-item" style="border:none;padding:0;background:transparent;gap:12px;" id="auth-skeleton">
                <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
                <div style="flex:1;">
                    <div class="skeleton" style="height:13px;width:70%;margin-bottom:6px;"></div>
                    <div class="skeleton" style="height:11px;width:50%;"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main style="flex:1;padding:40px 48px;max-width:960px;margin:0 auto;width:100%;">

        <div class="page-header">
            <h1 class="page-title">My Library</h1>
            <a href="create-quiz.html" class="btn-new-quiz" id="new-quiz-btn" style="display:none;">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
                New Quiz
            </a>
        </div>

        <!-- Login prompt (hidden by default) -->
        <div class="login-prompt" id="login-prompt" style="display:none;">
            <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;color:#c7d2fe;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <h2>Sign in to view your library</h2>
            <p>Your quizzes are saved to your account — log in to access them.</p>
            <a href="auth.html" class="btn-login">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Login / Sign up
            </a>
        </div>

        <!-- Library Content (hidden until auth confirmed) -->
        <div id="library-content" style="display:none;">

            <!-- Column Headers -->
            <div class="list-header">
                <span class="col-title">Quiz</span>
                <span class="col-code">Code</span>
                <span class="col-date">Created</span>
                <span class="col-actions"></span>
            </div>

            <!-- Skeleton rows while fetching -->
            <div class="quiz-list" id="skeleton-list">
                <div class="skeleton-item">
                    <div class="skeleton" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton" style="height:14px;width:55%;margin-bottom:8px;"></div><div class="skeleton" style="height:11px;width:30%;"></div></div>
                    <div class="skeleton" style="width:80px;height:28px;border-radius:8px;"></div>
                    <div class="skeleton" style="width:100px;height:14px;border-radius:6px;"></div>
                    <div class="skeleton" style="width:72px;height:32px;border-radius:8px;"></div>
                </div>
                <div class="skeleton-item">
                    <div class="skeleton" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton" style="height:14px;width:45%;margin-bottom:8px;"></div><div class="skeleton" style="height:11px;width:25%;"></div></div>
                    <div class="skeleton" style="width:80px;height:28px;border-radius:8px;"></div>
                    <div class="skeleton" style="width:100px;height:14px;border-radius:6px;"></div>
                    <div class="skeleton" style="width:72px;height:32px;border-radius:8px;"></div>
                </div>
            </div>

            <!-- Actual quiz list -->
            <div class="quiz-list" id="quiz-list" style="display:none;"></div>

            <!-- Empty state -->
            <div class="empty-state" id="empty-state" style="display:none;">
                <svg width="56" height="56" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                </svg>
                <h3>No quizzes yet</h3>
                <p>Click <strong>+ New Quiz</strong> to create your first one.</p>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Dropdown overlay (close on click outside) -->
    <script>
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            }
        });
    </script>

    <script type="module" src="../js/library.js"></script>
    <script>
        // Sidebar toggle (shared state with quiz page)
        const sidebar = document.getElementById('main-sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const COLLAPSED_KEY = 'sidebar-collapsed';
        if (localStorage.getItem(COLLAPSED_KEY) === 'true') sidebar.classList.add('collapsed');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem(COLLAPSED_KEY, sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
