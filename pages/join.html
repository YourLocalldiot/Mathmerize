<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/Mathmerize%20logo_Favicon_Purple_White.png" type="image/png">
    <title>Mathmerize - Join Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body class="min-h-screen mesh-bg flex items-center justify-center p-4">

    <!-- Go Back Link -->
    <a href="../index.html" class="absolute top-6 left-6 flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Home
    </a>

    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white rounded-3xl shadow-2xl overflow-hidden p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-cyan-600 tracking-tight flex items-center justify-center gap-2 mb-2">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Join Quiz
            </h1>
            <p class="text-slate-500">Enter a code to join an existing quiz</p>
        </div>

        <!-- Join Form -->
        <form id="join-form" class="block space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Quiz Code</label>
                <input type="text" id="quiz-code-input" placeholder="e.g. A3B4C5D" required autocomplete="off" spellcheck="false" style="text-transform: uppercase;"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-center font-mono text-xl tracking-widest font-bold text-slate-700 placeholder-slate-300">
            </div>
            
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-600 hover:to-cyan-700 text-white rounded-xl font-bold transition-all shadow-md active:scale-[0.98]">
                Join Now
            </button>
        </form>

    </div>

    <script>
        document.getElementById('join-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('quiz-code-input').value.trim().toUpperCase();
            if (code) {
                window.location.href = `quiz.html?code=${encodeURIComponent(code)}`;
            }
        });
    </script>
</body>
</html>
