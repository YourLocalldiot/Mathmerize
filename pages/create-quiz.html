<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../images/Mathmerize%20logo_Favicon_Purple_White.png" type="image/png">
    <title>Create Quiz — Mathmerize</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>

    <link rel="stylesheet" href="../css/create-quiz.css">
    <link rel="stylesheet" href="../css/mathkeyboard.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="main-sidebar">
        <!-- Header: logo left, toggle right -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-image mask-logo" title="Mathmerize"></div>
            </div>
            <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="library.html" class="nav-link active">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 14v-4a4 4 0 018 0v4M5 20h14a2 2 0 002-2v-1a2 2 0 00-2-2H5a2 2 0 00-2 2v1a2 2 0 002 2z"/>
                </svg>
                <span>Library</span>
            </a>
        </nav>

        <div class="auth-section" id="auth-container">
            <div style="display:flex;align-items:center;gap:12px;" id="auth-skeleton">
                <div class="skeleton" style="width:38px;height:38px;border-radius:50%;flex-shrink:0;"></div>
                <div style="flex:1;">
                    <div class="skeleton" style="height:13px;width:70%;margin-bottom:6px;"></div>
                    <div class="skeleton" style="height:11px;width:50%;"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Create Area -->
    <main class="create-main">
        
        <!-- Top Toolbar -->
        <header class="toolbar" id="quiz-toolbar">
            <div class="toolbar-left">
                <a href="library.html" class="back-btn" title="Back to Library">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <input type="text" id="quiz-title-input" class="quiz-title-input" value="Untitled Quiz" placeholder="Quiz Title">
            </div>
            <div class="toolbar-right">
                <label class="flex items-center cursor-pointer mr-2" title="Randomize questions order for each student">
                    <div class="relative">
                        <input type="checkbox" id="randomize-switch" class="sr-only peer">
                        <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                    </div>
                    <span class="ml-2 text-sm font-medium text-slate-600">Randomize questions</span>
                </label>

                <button id="save-btn" class="toolbar-btn save-btn">
                    <span id="save-btn-text">Publish</span>
                    <svg id="save-spinner" class="spinner-icon hidden" width="16" height="16" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-container" id="quiz-content">
            <div class="content-header">
                <h2 id="question-count-display">0 Questions</h2>
                <button id="create-q-btn" class="action-btn">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                    </svg>
                    Create question
                </button>
            </div>

            <div id="questions-list" class="questions-list">
                <!-- Question Blocks will be dynamically generated here -->
            </div>

            <button id="add-q-btn" class="action-btn block mx-auto mt-6">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                </svg>
                Add question
            </button>
        </div> <!-- End of quiz-content -->

        <!-- Login prompt (hidden by default) -->
        <div class="login-prompt" id="login-prompt" style="display:none; text-align: center; max-width: 400px; margin: 80px auto; padding: 40px; background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
            <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto 16px;color:#c7d2fe;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <h2 style="font-size:1.5rem; font-weight:700; color:#1e293b; margin-bottom:8px;">Sign in to create quizzes</h2>
            <p style="color:#64748b; margin-bottom:24px; font-size:0.95rem;">You need an account to build and save your own Mathmerize quizzes.</p>
            <a href="auth.html" style="display:inline-flex; align-items:center; gap:8px; background:linear-gradient(to right, #6366f1, #8b5cf6); color:white; padding:12px 24px; border-radius:12px; font-weight:600; text-decoration:none; transition:transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 12px rgba(99,102,241,0.3)';" onmouseout="this.style.transform='none'; this.style.boxShadow='none';">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Login / Sign up
            </a>
        </div>

        <!-- Edit Question View (Hidden by default) -->
        <div id="edit-question-view" class="content-container hidden">
            <!-- Quiz Title is in toolbar, so we just show the card -->
            <div class="w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl border border-slate-200">
                <div class="p-4 sm:p-6 pb-4">
                    <div class="flex justify-between items-center mb-4">
                        <span id="edit-q-header" class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">
                            QUESTION
                        </span>
                        <button id="cancel-edit-btn" class="text-xs font-bold text-slate-400 hover:text-slate-600 uppercase tracking-widest cursor-pointer">
                            Cancel
                        </button>
                    </div>

                    <div class="mb-4 flex flex-col gap-3">
                        <div class="relative w-full">
                            <input type="text" id="edit-q-prompt" class="w-full text-center text-sm sm:text-base font-medium text-slate-700 border border-slate-200 rounded-xl p-3 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 outline-none transition-all latex-font bg-white" placeholder="Type the question...">
                        </div>
                        <div class="relative w-full">
                            <div id="edit-q-equation" class="w-full text-center text-xl sm:text-3xl font-bold text-slate-800 border border-slate-200 rounded-xl p-3 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 outline-none transition-all latex-font bg-white"></div>
                            <div id="edit-q-equation-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-400 pointer-events-none z-0 latex-font text-xl sm:text-3xl">Type the equation...</div>
                        </div>
                        <label class="flex items-center gap-2 text-sm font-medium text-slate-600 mt-1 mb-2 justify-center cursor-pointer">
                            <input type="checkbox" id="edit-q-force-answer" class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
                            Force given correct answer
                        </label>
                    </div>

                    <div class="relative w-full">
                        <div id="edit-math-field" class="latex-font relative z-10 bg-transparent"></div>
                        <div id="edit-math-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-400 text-sm sm:text-base font-medium pointer-events-none z-0 latex-font">Type the answer...</div>
                    </div>

                    <!-- ===================== MATH KEYBOARD ===================== -->
                    <div class="mk-wrapper" id="edit-mk-wrapper">

                        <!-- Functions slide-up panel -->
                        <div class="mk-fn-panel" id="edit-fn-panel">
                            <!-- Trig -->
                            <div class="mk-fn-section">
                                <div class="mk-fn-section-title">Trigonometry</div>
                                <div class="mk-fn-grid">
                                    <button class="mk-fn-btn" data-mk-cmd="\sin">sin</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\cos">cos</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\tan">tan</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\csc">csc</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\sec">sec</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\cot">cot</button>
                                </div>
                            </div>
                            <!-- Inverse Trig -->
                            <div class="mk-fn-section">
                                <div class="mk-fn-section-title">Inverse Trigonometry</div>
                                <div class="mk-fn-grid">
                                    <button class="mk-fn-btn" data-mk-cmd="\arcsin">sin<sup>−1</sup></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\arccos">cos<sup>−1</sup></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\arctan">tan<sup>−1</sup></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{arccsc}">csc<sup>−1</sup></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{arcsec}">sec<sup>−1</sup></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{arccot}">cot<sup>−1</sup></button>
                                </div>
                            </div>
                            <!-- Calculus -->
                            <div class="mk-fn-section">
                                <div class="mk-fn-section-title">Calculus</div>
                                <div class="mk-fn-grid">
                                    <button class="mk-fn-btn" data-mk-cmd="\exp">exp</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\ln">ln</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\log">log</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\log_{}">log<sub style="font-size:0.55em">a</sub></button>
                                    <button class="mk-fn-btn" data-mk-cmd="\int">∫</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\sum">Σ</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\prod">Π</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\lim_{ }">lim</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\frac{d}{dx}">d/dx</button>
                                </div>
                            </div>
                            <!-- Hyperbolic -->
                            <div class="mk-fn-section">
                                <div class="mk-fn-section-title">Hyperbolic Trigonometry</div>
                                <div class="mk-fn-grid">
                                    <button class="mk-fn-btn" data-mk-cmd="\sinh">sinh</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\cosh">cosh</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\tanh">tanh</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{csch}">csch</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{sech}">sech</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\coth">coth</button>
                                </div>
                            </div>
                            <!-- Number Theory -->
                            <div class="mk-fn-section">
                                <div class="mk-fn-section-title">Number Theory</div>
                                <div class="mk-fn-grid">
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{lcm}">lcm</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\gcd">gcd</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{mod}">mod</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\lceil">⌈ ⌉</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\lfloor">⌊ ⌋</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{round}">round</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{sign}">sign</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\sqrt[]{}"><sup style="font-size:0.55em">n</sup>√</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{nPr}">nPr</button>
                                    <button class="mk-fn-btn" data-mk-cmd="\operatorname{nCr}">nCr</button>
                                </div>
                            </div>
                        </div>

                        <!-- Main keyboard grid -->
                        <div class="mk-main-keyboard" id="edit-main-keyboard">
                            <!-- === SYMBOL SECTION (cols 1-4) === -->
                            <button class="mk-btn italic" data-mk-cmd="x">x</button>
                            <button class="mk-btn italic" data-mk-cmd="y">y</button>
                            <button class="mk-btn" data-mk-cmd="^2"><span>a</span><span class="sup">2</span></button>
                            <button class="mk-btn" data-mk-cmd="^"><span>a</span><span class="sup">b</span></button>
                            <!-- col spacer -->
                            <div class="mk-col-spacer" style="grid-row:span 4;"></div>
                            <!-- === NUMPAD SECTION (cols 6-9) === -->
                            <button class="mk-btn num" data-mk-cmd="7">7</button>
                            <button class="mk-btn num" data-mk-cmd="8">8</button>
                            <button class="mk-btn num" data-mk-cmd="9">9</button>
                            <button class="mk-btn" data-mk-cmd="/">÷</button>
                            <!-- col spacer -->
                            <div class="mk-col-spacer" style="grid-row:span 4;"></div>
                            <!-- === ACTION SECTION (cols 11-12) === -->
                            <button class="mk-btn fn-toggle" id="edit-fn-toggle" style="grid-column:span 2;">Functions</button>

                            <!-- Row 2 -->
                            <button class="mk-btn" data-mk-cmd="(">(</button>
                            <button class="mk-btn" data-mk-cmd=")">)</button>
                            <button class="mk-btn" data-mk-cmd="<">&lt;</button>
                            <button class="mk-btn" data-mk-cmd=">">&gt;</button>
                            <button class="mk-btn num" data-mk-cmd="4">4</button>
                            <button class="mk-btn num" data-mk-cmd="5">5</button>
                            <button class="mk-btn num" data-mk-cmd="6">6</button>
                            <button class="mk-btn" data-mk-cmd="\times">×</button>
                            <button class="mk-btn action" id="edit-left-btn">←</button>
                            <button class="mk-btn action" id="edit-right-btn">→</button>

                            <!-- Row 3 -->
                            <button class="mk-btn" data-mk-cmd="|">|a|</button>
                            <button class="mk-btn" data-mk-cmd=",">,</button>
                            <button class="mk-btn" data-mk-cmd="\le">≤</button>
                            <button class="mk-btn" data-mk-cmd="\ge">≥</button>
                            <button class="mk-btn num" data-mk-cmd="1">1</button>
                            <button class="mk-btn num" data-mk-cmd="2">2</button>
                            <button class="mk-btn num" data-mk-cmd="3">3</button>
                            <button class="mk-btn" data-mk-cmd="-">−</button>
                            <button class="mk-btn action mk-span-2-row" id="edit-backspace-btn" style="grid-column:span 2;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                            </button>

                            <!-- Row 4 -->
                            <button class="mk-btn action mk-abc-toggle" style="font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500;">A B C</button>
                            <button class="mk-btn" data-mk-cmd="\sqrt">√</button>
                            <button class="mk-btn" data-mk-cmd="\frac">a/b</button>
                            <button class="mk-btn" data-mk-cmd="\pi">π</button>
                            <button class="mk-btn num" data-mk-cmd="0">0</button>
                            <button class="mk-btn num" data-mk-cmd=".">.</button>
                            <button class="mk-btn" data-mk-cmd="=">=</button>
                            <button class="mk-btn" data-mk-cmd="+">+</button>
                        </div>

                        <!-- ABC Letter keyboard grid -->
                        <div class="mk-abc-keyboard" id="edit-abc-keyboard">
                            <!-- Row 1 -->
                            <button class="mk-btn letter italic" data-mk-cmd="q" style="grid-column: span 2;">q</button>
                            <button class="mk-btn letter italic" data-mk-cmd="w" style="grid-column: span 2;">w</button>
                            <button class="mk-btn letter italic" data-mk-cmd="e" style="grid-column: span 2;">e</button>
                            <button class="mk-btn letter italic" data-mk-cmd="r" style="grid-column: span 2;">r</button>
                            <button class="mk-btn letter italic" data-mk-cmd="t" style="grid-column: span 2;">t</button>
                            <button class="mk-btn letter italic" data-mk-cmd="y" style="grid-column: span 2;">y</button>
                            <button class="mk-btn letter italic" data-mk-cmd="u" style="grid-column: span 2;">u</button>
                            <button class="mk-btn letter italic" data-mk-cmd="i" style="grid-column: span 2;">i</button>
                            <button class="mk-btn letter italic" data-mk-cmd="o" style="grid-column: span 2;">o</button>
                            <button class="mk-btn letter italic" data-mk-cmd="p" style="grid-column: span 2;">p</button>

                            <!-- Row 2 -->
                            <button class="mk-btn letter italic" data-mk-cmd="a" style="grid-column: span 2;">a</button>
                            <button class="mk-btn letter italic" data-mk-cmd="s" style="grid-column: span 2;">s</button>
                            <button class="mk-btn letter italic" data-mk-cmd="d" style="grid-column: span 2;">d</button>
                            <button class="mk-btn letter italic" data-mk-cmd="f" style="grid-column: span 2;">f</button>
                            <button class="mk-btn letter italic" data-mk-cmd="g" style="grid-column: span 2;">g</button>
                            <button class="mk-btn letter italic" data-mk-cmd="h" style="grid-column: span 2;">h</button>
                            <button class="mk-btn letter italic" data-mk-cmd="j" style="grid-column: span 2;">j</button>
                            <button class="mk-btn letter italic" data-mk-cmd="k" style="grid-column: span 2;">k</button>
                            <button class="mk-btn letter italic" data-mk-cmd="l" style="grid-column: span 2;">l</button>
                            <button class="mk-btn italic" data-mk-cmd="\theta" style="grid-column: span 2;">θ</button>

                            <!-- Row 3 -->
                            <button class="mk-btn action mk-shift-btn" style="grid-column: span 3;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                            </button>
                            <button class="mk-btn letter italic" data-mk-cmd="z" style="grid-column: span 2;">z</button>
                            <button class="mk-btn letter italic" data-mk-cmd="x" style="grid-column: span 2;">x</button>
                            <button class="mk-btn letter italic" data-mk-cmd="c" style="grid-column: span 2;">c</button>
                            <button class="mk-btn letter italic" data-mk-cmd="v" style="grid-column: span 2;">v</button>
                            <button class="mk-btn letter italic" data-mk-cmd="b" style="grid-column: span 2;">b</button>
                            <button class="mk-btn letter italic" data-mk-cmd="n" style="grid-column: span 2;">n</button>
                            <button class="mk-btn letter italic" data-mk-cmd="m" style="grid-column: span 2;">m</button>
                            <button class="mk-btn action mk-backspace-btn" style="grid-column: span 3;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                            </button>

                            <!-- Row 4 -->
                            <button class="mk-btn action mk-num-toggle" style="grid-column: span 4; font-family: 'Inter', sans-serif; font-size: 1rem;">1 2 3</button>
                            <button class="mk-btn" data-mk-cmd="_" style="grid-column: span 2;">a<sub style="font-size: 0.6em;">b</sub></button>
                            <button class="mk-btn" data-mk-cmd="!" style="grid-column: span 2;">! <span style="font-size: 0.7em; color: #94a3b8;">%</span></button>
                            <button class="mk-btn" data-mk-cmd="\left[\right]" style="grid-column: span 2;">[ ]</button>
                            <button class="mk-btn" data-mk-cmd="\left\{\right\}" style="grid-column: span 2;">{ }</button>
                            <button class="mk-btn" data-mk-cmd=":" style="grid-column: span 2;">~ <span style="font-size: 0.7em; color: #94a3b8;">:</span></button>
                            <button class="mk-btn" data-mk-cmd="," style="grid-column: span 2;">, <span style="font-size: 0.7em; color: #94a3b8;">'</span></button>
                            <button class="mk-btn enter mk-enter-btn" style="grid-column: span 4;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10l-5 5 5 5"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
                            </button>
                        </div>
                    </div>
                    <!-- ==================== END KEYBOARD ====================== -->

                    <button id="save-q-detail-btn" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 sm:py-4 rounded-xl transition-all shadow-lg active:transform active:scale-[0.98]">
                        Save question
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script type="module" src="../js/create-quiz.js"></script>
    <script>
        // Sidebar toggle
        const sidebar = document.getElementById('main-sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const COLLAPSED_KEY = 'sidebar-collapsed';
        if (localStorage.getItem(COLLAPSED_KEY) === 'true') sidebar.classList.add('collapsed');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem(COLLAPSED_KEY, sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
